name: CI

on:
  push:
    branches:
    - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # frozen: v7.0.0
    - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # frozen: v8.3.2
      with:
        enable-cache: true
        python-version: '3.14'
    - name: Cache pre-commit environments
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # frozen: v6.1.0
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
    - name: Run pre-commit
      run: uvx --with pre-commit-uv pre-commit run --all-files --show-diff-on-failure

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # frozen: v7.0.0
    - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # frozen: v8.3.2
      with:
        enable-cache: true
        python-version: '3.14'
    # Interim single-version run; the full tox matrix and coverage gate follow
    # once there is more than the core module to test.
    - name: Run tests
      run: uv run --frozen pytest

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # frozen: v7.0.0
    - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # frozen: v8.3.2
      with:
        enable-cache: true
        python-version: '3.14'
    - name: Build distributions
      run: uv build
    - name: Upload distributions
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # frozen: v7.0.1
      with:
        name: dist
        path: dist/
        if-no-files-found: error
