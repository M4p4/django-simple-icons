name: CI

on:
  push:
    branches:
    - main
    tags:
    # Dotted version tags only (16.26.0, 16.26.0.1), so a bare tag like
    # `nightly` cannot start the pipeline. Uses only documented glob syntax --
    # character ranges such as [0-9] are not documented for tag filters, and an
    # unsupported pattern would fail silently by never triggering a release.
    - '*.*.*'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel a tag build: it is the one that publishes to PyPI.
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  FORCE_COLOR: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # frozen: v7.0.0
    - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # frozen: v8.3.2
      with:
        enable-cache: true
        python-version: '3.14'
    - name: Cache pre-commit environments
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # frozen: v6.1.0
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
    - name: Run pre-commit
      run: uvx --with pre-commit-uv pre-commit run --all-files --show-diff-on-failure

  tests:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.12'
        - '3.13'
        - '3.14'
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # frozen: v7.0.0
    - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # frozen: v8.3.2
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}
    # Pinned like the action SHAs above: tox-uv decides which dependency groups
    # each env installs, so an unreviewed upgrade can silently change what is
    # actually tested.
    - name: Run tox targets for Python ${{ matrix.python-version }}
      run: uvx --with tox-uv==1.35.2 tox==4.57.0 run -f py$(echo ${{ matrix.python-version }} | tr -d .)
    - name: Upload coverage data
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # frozen: v7.0.1
      with:
        name: coverage-data-${{ matrix.python-version }}
        path: .coverage/
        include-hidden-files: true
        if-no-files-found: error

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: tests
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # frozen: v7.0.0
    - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # frozen: v8.3.2
      with:
        enable-cache: true
        python-version: '3.14'
    - name: Download coverage data
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # frozen: v7.0.0
      with:
        pattern: coverage-data-*
        merge-multiple: true
        path: .coverage/
    - name: Combine coverage and report
      run: |
        uv run --frozen coverage combine
        uv run --frozen coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
        uv run --frozen coverage report --fail-under=100

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # frozen: v7.0.0
    - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # frozen: v8.3.2
      with:
        enable-cache: true
        python-version: '3.14'
    - name: Build distributions
      run: uv build
    - name: Upload distributions
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # frozen: v7.0.1
      with:
        name: dist
        path: dist/
        if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    # Publish only a tag whose every check passed, and only the artifact those
    # checks were run against -- this job never rebuilds.
    needs: [ lint, tests, coverage, build ]
    if: startsWith(github.ref, 'refs/tags/')
    environment: release
    permissions:
      id-token: write
    # No checkout: the version is read from the artifact being published rather
    # than from the repo, so this job needs no repo access at all.
    steps:
    - name: Download distributions
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # frozen: v7.0.0
      with:
        name: dist
        path: dist/
    - name: Check the tag matches the version being published
      run: |
        set -euo pipefail
        version=""
        for wheel in dist/*.whl; do
          [ -e "$wheel" ] || continue
          if [ -n "$version" ]; then
            echo "::error::more than one wheel in dist/, refusing to guess"
            exit 1
          fi
          filename=$(basename "$wheel")
          version=${filename#*-}
          version=${version%%-*}
        done
        if [ -z "$version" ]; then
          echo "::error::no wheel found in dist/"
          exit 1
        fi
        if [ "$GITHUB_REF_NAME" != "$version" ]; then
          echo "::error::tag $GITHUB_REF_NAME does not match packaged version $version ($filename)"
          exit 1
        fi
        echo "Releasing $version"
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # frozen: v1.14.0
